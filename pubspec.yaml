name: stockapp_mvp
description: Stock/Order MVP based on user's spec
version: 1.0.0+4

publish_to: "none"

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  archive: ^4.0.9
  crypto: ^3.0.6
  cryptography: ^2.7.0
  provider: ^6.1.2
  uuid: ^4.5.1
  intl: ">=0.19.0 <0.21.0"
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.4
  share_plus: ^10.0.2
  path_provider: ^2.1.4
  google_mlkit_text_recognition: ^0.15.0
  image: ^4.5.2
  image_picker: ^1.0.7
  file_picker: ^8.0.0
  csv: ^6.0.0
  http: ^1.2.0
  url_launcher: ^6.3.2
  googleapis_auth: ^1.6.0
  drift: ^2.20.0
  sqlite3: ^2.9.4
  sqlite3_flutter_libs: ^0.5.24
  path: ^1.9.0
  reorderable_grid_view: ^2.2.8
  google_sign_in: 6.2.1
  firebase_core: ^3.10.0
  firebase_auth: ^5.3.0
  firebase_storage: ^12.4.10
  cloud_firestore: ^5.6.12
  purchases_flutter: ^10.1.1
  flutter_local_notifications: ^19.5.0
  table_calendar: ^3.0.9
  timezone: ^0.10.1
  flutter_contacts: ^1.1.9+2
  flutter_quill: ^11.5.1
  webview_flutter: ^4.13.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  drift_dev: ^2.20.0
  build_runner: ^2.4.9
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icons/chalstock_icon_1024.png
  remove_alpha_ios: true

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/sql/schema.sql
    - assets/sql/seed.sql
    - assets/seeds/2025-10-26/folders.json
    - assets/seeds/2025-10-26/items.json
    - assets/seeds/2025-10-26/bom.json
    - assets/seeds/2025-10-26/lots.json
    - assets/images/chalstock_puppy.png
    - assets/images/chalstock_intro.png
    - assets/images/chalstock_start.png
    - assets/images/chalstock_intro_macos.png
    - assets/images/chalstock_start_macos.png
    - assets/images/chal_happy.png
    - assets/images/chal_pup2.png
